name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  static-checks:
    name: cargo check / clippy / doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo check (all features)
        run: cargo check --all-features --all-targets

      - name: cargo clippy (all features, deny warnings)
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: cargo doc (all features, no deps)
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  unit-tests:
    name: cargo test (non-ignored)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test (all features, no ignored)
        run: cargo test --all-features

  redis-integration:
    name: Redis integration tests (#[ignore])
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The integration tests under `#[ignore]` spin up their own Redis 7-alpine
      # containers via `testcontainers`, so we rely on the runner's Docker
      # daemon rather than a service container. `ubuntu-latest` ships with
      # Docker preinstalled.
      - name: Verify Docker is available
        run: docker version

      - name: cargo test --ignored (Redis integration)
        run: cargo test --all-features -- --ignored
